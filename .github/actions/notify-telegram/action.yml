name: Notify Telegram
description: Send a Telegram notification for release pipeline events.
inputs:
  token:
    description: Telegram bot token.
    required: false
  chat-id:
    description: Telegram chat id.
    required: false
  phase:
    description: Notification phase. Use started or finished.
    required: true
  app-name:
    description: Human-readable application name.
    required: true
  status:
    description: Final job status.
    required: false
    default: ""
  image-tag:
    description: Image tag or release version.
    required: false
    default: ""
  app-url:
    description: Public application URL.
    required: false
    default: ""
  run-url:
    description: GitHub Actions run URL.
    required: false
    default: ""
  started-at-iso:
    description: Release start time in ISO format.
    required: false
    default: ""
  started-at-epoch:
    description: Release start time as Unix epoch seconds.
    required: false
    default: ""
  build-duration-seconds:
    description: Build duration in seconds.
    required: false
    default: ""
  sync-duration-seconds:
    description: Deployment sync duration in seconds.
    required: false
    default: ""
  verify-duration-seconds:
    description: Live version verification duration in seconds.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Send notification
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ inputs.token }}
        TELEGRAM_CHAT_ID: ${{ inputs.chat-id }}
        PHASE: ${{ inputs.phase }}
        APP_NAME: ${{ inputs.app-name }}
        STATUS: ${{ inputs.status }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        APP_URL: ${{ inputs.app-url }}
        RUN_URL: ${{ inputs.run-url }}
        STARTED_AT_ISO: ${{ inputs.started-at-iso }}
        STARTED_AT_EPOCH: ${{ inputs.started-at-epoch }}
        BUILD_DURATION_SECONDS: ${{ inputs.build-duration-seconds }}
        SYNC_DURATION_SECONDS: ${{ inputs.sync-duration-seconds }}
        VERIFY_DURATION_SECONDS: ${{ inputs.verify-duration-seconds }}
      run: |
        if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
          echo "Telegram token/chat id are not available; skipping notification."
          exit 0
        fi

        python3 - <<'PY'
        import html
        import os
        import time
        import urllib.parse
        import urllib.request

        def value(name: str, default: str = "") -> str:
            return os.environ.get(name) or default

        def duration(raw: str) -> str:
            if not raw:
                return "unknown"
            try:
                seconds = int(raw)
            except ValueError:
                return raw
            if seconds < 60:
                return f"{seconds}s"
            return f"{seconds // 60}m {seconds % 60}s"

        def esc(raw: str) -> str:
            return html.escape(raw, quote=True)

        token = os.environ["TELEGRAM_BOT_TOKEN"]
        chat_id = os.environ["TELEGRAM_CHAT_ID"]
        phase = value("PHASE")
        app_name = value("APP_NAME", "Application")
        image_tag = value("IMAGE_TAG", "unknown")
        app_url = value("APP_URL")
        run_url = value("RUN_URL")

        if phase == "started":
            started = value("STARTED_AT_ISO", "unknown")
            lines = [
                f"<b>{esc(app_name)}</b> release started",
                "",
                f"Version <code>{esc(image_tag)}</code>",
                f"Started <code>{esc(started)}</code>",
            ]
        else:
            status = value("STATUS", "unknown")
            success = status == "success"
            result = "Release finished successfully" if success else "Release failed"
            started_epoch = value("STARTED_AT_EPOCH")
            total_duration = "unknown"
            if started_epoch:
                try:
                    total_duration = duration(str(int(time.time()) - int(started_epoch)))
                except ValueError:
                    total_duration = "unknown"
            lines = [
                f"<b>{esc(app_name)}</b> - {esc(result)}",
                f"Status <code>{esc(status)}</code> - Total <b>{esc(total_duration)}</b>",
            ]
            duration_parts = []
            build_duration = value("BUILD_DURATION_SECONDS")
            sync_duration = value("SYNC_DURATION_SECONDS")
            verify_duration = value("VERIFY_DURATION_SECONDS")
            if build_duration:
                duration_parts.append(f"Build <code>{esc(duration(build_duration))}</code>")
            if sync_duration:
                duration_parts.append(f"Sync <code>{esc(duration(sync_duration))}</code>")
            if verify_duration:
                duration_parts.append(f"Live version <code>{esc(duration(verify_duration))}</code>")
            if duration_parts:
                lines.extend(["", " - ".join(duration_parts)])
            lines.extend(["", f"Version <code>{esc(image_tag)}</code>"])

        if app_url:
            lines.extend(["", esc(app_url)])
        if run_url:
            lines.append(esc(run_url))

        payload = urllib.parse.urlencode({
            "chat_id": chat_id,
            "text": "\n".join(lines),
            "parse_mode": "HTML",
            "disable_web_page_preview": "true",
        }).encode()

        api_url = f"https://api.telegram.org/bot{token}/sendMessage"
        with urllib.request.urlopen(api_url, data=payload, timeout=15) as response:
            body = response.read()
            if response.status >= 300:
                raise SystemExit(body.decode("utf-8", "replace"))
        PY
