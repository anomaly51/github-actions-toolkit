name: Sync Deployment
description: Trigger a deployment sync and wait for the target Git revision.
inputs:
  server:
    description: Deployment controller base URL.
    required: true
  auth-token:
    description: Deployment controller bearer token.
    required: true
  app-name:
    description: Deployment application name.
    required: true
  revision:
    description: Git revision expected after sync.
    required: true
  resolve-ip:
    description: Optional IP for curl --resolve.
    required: false
    default: ""
  insecure:
    description: Set to true to allow insecure TLS.
    required: false
    default: "false"
  attempts:
    description: Number of polling attempts.
    required: false
    default: "30"
  interval-seconds:
    description: Delay between attempts.
    required: false
    default: "1"
  prune:
    description: Whether sync should prune removed resources.
    required: false
    default: "true"
outputs:
  duration_seconds:
    description: Sync duration in seconds.
    value: ${{ steps.sync.outputs.duration_seconds }}
  health:
    description: Health status reported at sync completion.
    value: ${{ steps.sync.outputs.health }}
runs:
  using: composite
  steps:
    - name: Sync deployment
      id: sync
      shell: bash
      env:
        DEPLOYMENT_SERVER: ${{ inputs.server }}
        DEPLOYMENT_AUTH_TOKEN: ${{ inputs.auth-token }}
        DEPLOYMENT_APP_NAME: ${{ inputs.app-name }}
        TARGET_REVISION: ${{ inputs.revision }}
        DEPLOYMENT_RESOLVE_IP: ${{ inputs.resolve-ip }}
        DEPLOYMENT_INSECURE: ${{ inputs.insecure }}
        ATTEMPTS: ${{ inputs.attempts }}
        INTERVAL_SECONDS: ${{ inputs.interval-seconds }}
        PRUNE: ${{ inputs.prune }}
      run: |
        started_at="$(date +%s)"
        deployment_url="${DEPLOYMENT_SERVER%/}"
        auth_header="Authorization: Bearer ${DEPLOYMENT_AUTH_TOKEN}"
        deployment_host="$(python3 - <<'PY'
        import os
        from urllib.parse import urlparse

        print(urlparse(os.environ["DEPLOYMENT_SERVER"]).hostname or "")
        PY
        )"

        curl_opts=(-fsS)
        if [ "${DEPLOYMENT_INSECURE:-}" = "true" ]; then
          curl_opts+=(-k)
        fi
        if [ -n "${DEPLOYMENT_RESOLVE_IP:-}" ]; then
          if [ -z "${deployment_host}" ]; then
            echo "Could not parse deployment server host."
            exit 1
          fi
          curl_opts+=(--resolve "${deployment_host}:443:${DEPLOYMENT_RESOLVE_IP}")
        fi

        curl "${curl_opts[@]}" -X GET \
          -H "${auth_header}" \
          "${deployment_url}/api/v1/applications/${DEPLOYMENT_APP_NAME}?refresh=hard" \
          >/dev/null

        sync_payload="$(mktemp)"
        python3 - <<'PY' > "${sync_payload}"
        import json
        import os

        print(json.dumps({
            "prune": os.environ.get("PRUNE", "true").lower() == "true",
        }))
        PY

        if ! curl "${curl_opts[@]}" -X POST \
          -H "${auth_header}" \
          -H "Content-Type: application/json" \
          "${deployment_url}/api/v1/applications/${DEPLOYMENT_APP_NAME}/sync" \
          --data-binary @"${sync_payload}" \
          >/dev/null; then
          echo "Sync request was not accepted; continuing to poll refresh/auto-sync."
        fi

        for attempt in $(seq 1 "${ATTEMPTS}"); do
          app_json="$(curl "${curl_opts[@]}" \
            -H "${auth_header}" \
            "${deployment_url}/api/v1/applications/${DEPLOYMENT_APP_NAME}" \
            || true)"
          status="$(printf '%s' "${app_json}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("status", {}).get("operationState", {}).get("phase", ""))' 2>/dev/null || true)"
          synced_revision="$(printf '%s' "${app_json}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("status", {}).get("sync", {}).get("revision", ""))' 2>/dev/null || true)"
          health="$(printf '%s' "${app_json}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("status", {}).get("health", {}).get("status", ""))' 2>/dev/null || true)"

          if [ "${status}" = "Succeeded" ] && [ "${synced_revision}" = "${TARGET_REVISION}" ]; then
            finished_at="$(date +%s)"
            echo "Deployment ${DEPLOYMENT_APP_NAME} synced to ${synced_revision} with health ${health:-unknown}"
            echo "duration_seconds=$((finished_at - started_at))" >> "${GITHUB_OUTPUT}"
            echo "health=${health:-unknown}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status}" = "Failed" ] || [ "${status}" = "Error" ]; then
            echo "Deployment sync ${status} for ${DEPLOYMENT_APP_NAME}"
            printf '%s\n' "${app_json}" | python3 -m json.tool || true
            exit 1
          fi

          echo "Attempt ${attempt}/${ATTEMPTS}: status '${status:-unknown}', revision '${synced_revision:-unknown}', want '${TARGET_REVISION}', health '${health:-unknown}'"
          sleep "${INTERVAL_SECONDS}"
        done

        echo "Timed out waiting for ${DEPLOYMENT_APP_NAME} to sync to ${TARGET_REVISION}"
        exit 1
