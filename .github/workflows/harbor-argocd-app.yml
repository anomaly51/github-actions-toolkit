name: Harbor ArgoCD App

on:
  workflow_call:
    inputs:
      app-name:
        description: Argo CD application name.
        type: string
        required: true
      notification-title:
        description: Human-readable name used in Telegram deploy notifications.
        type: string
        required: false
        default: ""
      image-repository:
        description: Full Harbor image repository without tag.
        type: string
        required: true
      registry:
        description: Container registry hostname.
        type: string
        required: false
        default: harbor.api-api-api.com
      build-cache-repository:
        description: Shared Harbor repository used for BuildKit registry cache.
        type: string
        required: false
        default: harbor.api-api-api.com/shisha/ci-build-cache
      buildkit-endpoint:
        description: Remote BuildKit endpoint used by warm ARC runners.
        type: string
        required: false
        default: tcp://arc-buildkit.arc-runners.svc.cluster.local:1234
      build-context:
        description: Docker build context.
        type: string
        required: false
        default: .
      dockerfile:
        description: Dockerfile path.
        type: string
        required: false
        default: Dockerfile
      platforms:
        description: Build target platforms.
        type: string
        required: false
        default: linux/amd64
      runner:
        description: GitHub Actions runner label.
        type: string
        required: false
        default: arc-runner-set
      deploy-timeout-seconds:
        description: Max wait for Argo CD to expose the pushed image.
        type: string
        required: false
        default: "1200"
      deploy-poll-seconds:
        description: Poll interval for Argo CD verification.
        type: string
        required: false
        default: "5"
      argocd-cli-version:
        description: Argo CD CLI version to install.
        type: string
        required: false
        default: v3.4.3
      build-args:
        description: Extra docker build args, one KEY=VALUE per line.
        type: string
        required: false
        default: ""
    secrets:
      TELEGRAM_BOT_TOKEN:
        description: Telegram bot token for deployment notifications.
        required: false
      TELEGRAM_CHAT_ID:
        description: Telegram chat id for deployment notifications.
        required: false

permissions:
  contents: read

jobs:
  image:
    name: Build image
    runs-on: ${{ inputs.runner }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      cache_ref: ${{ steps.meta.outputs.cache_ref }}
      telegram_message_id: ${{ steps.telegram_start.outputs.message_id }}
      telegram_started_epoch: ${{ steps.telegram_start.outputs.started_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ inputs.image-repository }}
          BUILD_CACHE_REPOSITORY: ${{ inputs.build-cache-repository }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          image_tag="sha-${short_sha}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cache_tag="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9_.-]+#-#g')"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REPOSITORY}:${image_tag}" >> "$GITHUB_OUTPUT"
          echo "cache_ref=${BUILD_CACHE_REPOSITORY}:${cache_tag}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

      - name: Start Telegram deploy message
        id: telegram_start
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: start
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          stage: Building image
          image-ref: ${{ steps.meta.outputs.image_ref }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref-name: ${{ github.ref_name }}

      - name: Start Telegram build heartbeat
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.telegram_start.outputs.message_id != ''
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: heartbeat
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message-id: ${{ steps.telegram_start.outputs.message_id }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          stage: Building image
          image-ref: ${{ steps.meta.outputs.image_ref }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref-name: ${{ github.ref_name }}
          started-epoch: ${{ steps.telegram_start.outputs.started_epoch }}
          interval-seconds: "10"
          pid-file: ${{ runner.temp }}/telegram-build-heartbeat.pid

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Set up remote BuildKit
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit-endpoint }}

      - name: Login to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.HARBOR_USERNAME || secrets.HARBOR_PUSH_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD || secrets.HARBOR_PUSH_PASSWORD }}

      - name: Check image tag in Harbor
        id: image_exists
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${{ steps.meta.outputs.image_ref }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists: ${{ steps.meta.outputs.image_ref }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image_ref }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            ${{ inputs.build-args }}

      - name: Build image with registry cache
        if: github.event_name != 'pull_request' && steps.image_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            ${{ inputs.build-args }}

      - name: Stop Telegram build heartbeat
        if: always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: stop
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          pid-file: ${{ runner.temp }}/telegram-build-heartbeat.pid

      - name: Update Telegram after image build
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.telegram_start.outputs.message_id != ''
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: update
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message-id: ${{ steps.telegram_start.outputs.message_id }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          stage: Waiting for rollout
          image-ref: ${{ steps.meta.outputs.image_ref }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref-name: ${{ github.ref_name }}
          started-epoch: ${{ steps.telegram_start.outputs.started_epoch }}

  verify-deploy:
    name: Verify deploy
    needs: image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Start Telegram deploy heartbeat
        if: needs.image.outputs.telegram_message_id != ''
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: heartbeat
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message-id: ${{ needs.image.outputs.telegram_message_id }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          stage: Verifying rollout
          image-ref: ${{ needs.image.outputs.image_ref }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref-name: ${{ github.ref_name }}
          started-epoch: ${{ needs.image.outputs.telegram_started_epoch }}
          interval-seconds: "10"
          pid-file: ${{ runner.temp }}/telegram-deploy-heartbeat.pid

      - name: Install tools
        shell: bash
        env:
          ARGOCD_CLI_VERSION: ${{ inputs.argocd-cli-version }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          case "$(uname -m)" in
            x86_64|amd64)
              argocd_asset=argocd-linux-amd64
              jq_asset=jq-linux-amd64
              ;;
            aarch64|arm64)
              argocd_asset=argocd-linux-arm64
              jq_asset=jq-linux-arm64
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac
          curl -fsSL "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_CLI_VERSION}/${argocd_asset}" -o "${RUNNER_TEMP}/bin/argocd"
          chmod +x "${RUNNER_TEMP}/bin/argocd"
          if ! command -v jq >/dev/null 2>&1; then
            curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-1.8.1/${jq_asset}" -o "${RUNNER_TEMP}/bin/jq"
            chmod +x "${RUNNER_TEMP}/bin/jq"
          fi
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Wait for Argo CD deployment verification
        env:
          ARGOCD_APPLICATION: ${{ inputs.app-name }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
          ARGOCD_INSECURE: ${{ secrets.ARGOCD_INSECURE }}
          DEPLOY_TIMEOUT_SECONDS: ${{ inputs.deploy-timeout-seconds }}
          DEPLOY_POLL_SECONDS: ${{ inputs.deploy-poll-seconds }}
          IMAGE_REF: ${{ needs.image.outputs.image_ref }}
        shell: bash
        run: |
          set -euo pipefail
          : "${ARGOCD_SERVER:?Set the ARGOCD_SERVER repository secret}"
          : "${IMAGE_REF:?Missing built image ref}"

          argocd_common=(--grpc-web)
          if [ "${ARGOCD_INSECURE:-true}" != "false" ]; then
            argocd_common+=(--insecure)
          fi

          if [ -n "${ARGOCD_AUTH_TOKEN:-}" ]; then
            argocd_args=(--server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" "${argocd_common[@]}")
          elif [ -n "${ARGOCD_USERNAME:-}" ] && [ -n "${ARGOCD_PASSWORD:-}" ]; then
            login_attempt=1
            until timeout 30s argocd login "$ARGOCD_SERVER" --username "$ARGOCD_USERNAME" --password "$ARGOCD_PASSWORD" "${argocd_common[@]}"; do
              if [ "$login_attempt" -ge 12 ]; then
                echo "Argo CD login failed after ${login_attempt} attempts"
                exit 1
              fi
              echo "Argo CD login failed, retrying in ${DEPLOY_POLL_SECONDS}s"
              sleep "$DEPLOY_POLL_SECONDS"
              login_attempt=$((login_attempt + 1))
            done
            argocd_args=(--server "$ARGOCD_SERVER" "${argocd_common[@]}")
          else
            echo "Set ARGOCD_USERNAME and ARGOCD_PASSWORD or ARGOCD_AUTH_TOKEN"
            exit 1
          fi

          deadline=$((SECONDS + DEPLOY_TIMEOUT_SECONDS))
          while [ "$SECONDS" -lt "$deadline" ]; do
            if ! app_json="$(timeout 30s argocd app get "$ARGOCD_APPLICATION" --hard-refresh -o json "${argocd_args[@]}" 2>&1)"; then
              echo "Waiting for ${ARGOCD_APPLICATION}: argocd app get failed or timed out"
              echo "$app_json"
              sleep "$DEPLOY_POLL_SECONDS"
              continue
            fi
            sync_status="$(jq -r '.status.sync.status // "Unknown"' <<< "$app_json")"
            health_status="$(jq -r '.status.health.status // "Unknown"' <<< "$app_json")"
            images="$(jq -r '.status.summary.images[]?' <<< "$app_json")"

            image_found=false
            if grep -Fq "$IMAGE_REF" <<< "$images"; then
              image_found=true
            elif [ "$sync_status" = "Synced" ] && [ "$health_status" = "Healthy" ]; then
              if manifests="$(timeout 30s argocd app manifests "$ARGOCD_APPLICATION" "${argocd_args[@]}" 2>/dev/null)" \
                && grep -Fq "$IMAGE_REF" <<< "$manifests"; then
                image_found=true
              fi
            fi

            if [ "$image_found" = "true" ] \
              && [ "$sync_status" = "Synced" ] \
              && [ "$health_status" = "Healthy" ]; then
              echo "Verified ${ARGOCD_APPLICATION} at ${IMAGE_REF}"
              exit 0
            fi

            echo "Waiting for ${ARGOCD_APPLICATION}: sync=${sync_status}, health=${health_status}, target=${IMAGE_REF}"
            echo "Observed images:"
            sed 's/^/  - /' <<< "$images"
            sleep "$DEPLOY_POLL_SECONDS"
          done

          echo "Timed out waiting for ${ARGOCD_APPLICATION} to deploy ${IMAGE_REF}"
          timeout 30s argocd app get "$ARGOCD_APPLICATION" -o wide "${argocd_args[@]}" || true
          exit 1

      - name: Stop Telegram deploy heartbeat
        if: always()
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: stop
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          pid-file: ${{ runner.temp }}/telegram-deploy-heartbeat.pid

  notify:
    name: Notify deploy result
    needs:
      - image
      - verify-deploy
    if: always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Compute Telegram final status
        id: telegram_result
        shell: bash
        env:
          IMAGE_RESULT: ${{ needs.image.result }}
          VERIFY_RESULT: ${{ needs.verify-deploy.result }}
        run: |
          set -euo pipefail
          if [ "$IMAGE_RESULT" = "success" ] && [ "$VERIFY_RESULT" = "success" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "stage=Deployment verified" >> "$GITHUB_OUTPUT"
          elif [ "$IMAGE_RESULT" = "cancelled" ] || [ "$VERIFY_RESULT" = "cancelled" ]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
            echo "stage=Deployment cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "stage=Deployment failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Telegram deploy result
        if: needs.image.outputs.telegram_message_id != ''
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: update
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message-id: ${{ needs.image.outputs.telegram_message_id }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
          stage: ${{ steps.telegram_result.outputs.stage }}
          status: ${{ steps.telegram_result.outputs.status }}
          image-ref: ${{ needs.image.outputs.image_ref }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref-name: ${{ github.ref_name }}
          started-epoch: ${{ needs.image.outputs.telegram_started_epoch }}

      - name: Wait before deleting Telegram deploy message
        if: needs.image.outputs.telegram_message_id != ''
        shell: bash
        run: sleep 60

      - name: Delete Telegram deploy message
        if: needs.image.outputs.telegram_message_id != ''
        continue-on-error: true
        uses: anomaly51/github-actions-toolkit/.github/actions/deploy-telegram-message@main
        with:
          mode: delete
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message-id: ${{ needs.image.outputs.telegram_message_id }}
          app-name: ${{ inputs.notification-title || inputs.app-name }}
